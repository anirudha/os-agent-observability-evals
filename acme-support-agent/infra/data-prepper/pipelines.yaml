# Data Prepper pipelines: ingest OTLP traces, build service maps,
# and write to the otel-v1-apm-* indices the observability skills query.

entry-pipeline:
  delay: "100"
  source:
    otel_trace_source:
      ssl: false
      port: 21890
  buffer:
    bounded_blocking:
      buffer_size: 10240
      batch_size: 160
  sink:
    - pipeline:
        name: "raw-trace-pipeline"
    - pipeline:
        name: "service-map-pipeline"

raw-trace-pipeline:
  source:
    pipeline:
      name: "entry-pipeline"
  processor:
    - otel_traces:
    - otel_trace_group:
        hosts: ["https://opensearch:9200"]
        insecure: true
        username: "admin"
        password: "My_password_123!@#"
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        insecure: true
        username: "admin"
        password: "My_password_123!@#"
        index_type: "trace-analytics-raw"

service-map-pipeline:
  delay: "100"
  source:
    pipeline:
      name: "entry-pipeline"
  processor:
    - service_map:
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        insecure: true
        username: "admin"
        password: "My_password_123!@#"
        index_type: "trace-analytics-service-map"
