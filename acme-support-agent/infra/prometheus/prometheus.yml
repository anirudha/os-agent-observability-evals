global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  # Metrics the OTel Collector exports (GenAI token usage, request counts, etc.)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # The collector's own internal health metrics
  - job_name: "otel-collector-internal"
    static_configs:
      - targets: ["otel-collector:8888"]
