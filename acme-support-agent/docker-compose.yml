# Local AI observability stack for the Acme Support Agent tutorial.
# OpenSearch + Dashboards + OTel Collector + Data Prepper + Prometheus.
#
# LOCAL DEVELOPMENT ONLY. Default credentials and disabled TLS verification
# are not suitable for production. See docs/production.md for the AWS path.

services:
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: acme-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=My_password_123!@#"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:My_password_123!@# https://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [acme]

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: acme-dashboards
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["https://opensearch:9200"]'
      - "OPENSEARCH_USERNAME=admin"
      - "OPENSEARCH_PASSWORD=My_password_123!@#"
    depends_on:
      opensearch: { condition: service_healthy }
    networks: [acme]

  data-prepper:
    image: opensearchproject/data-prepper:2.10.0
    container_name: acme-data-prepper
    volumes:
      - ./infra/data-prepper/pipelines.yaml:/usr/share/data-prepper/pipelines/pipelines.yaml
      - ./infra/data-prepper/data-prepper-config.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml
    ports:
      - "21890:21890"  # OTLP traces from the collector
    depends_on:
      opensearch: { condition: service_healthy }
    networks: [acme]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    container_name: acme-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "8888:8888"  # collector internal metrics
      - "8889:8889"  # prometheus scrape (exported metrics)
    depends_on:
      - data-prepper
    networks: [acme]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: acme-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/rules.yml:/etc/prometheus/rules.yml
    ports:
      - "9090:9090"
    networks: [acme]

networks:
  acme:
    driver: bridge
